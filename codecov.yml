ignore:
  - "api/src/__tests__/**"
  - "api/src/**/*.test.ts"
  - "api/src/**/*.spec.ts"
  - "api/src/**/index.ts"

coverage:
  status:
    project:
      default:
        target: 80%
    patch:
      default:
        target: 85%

comment:
  layout: "reach, diff, files"
  behavior: default
  require_changes: true
